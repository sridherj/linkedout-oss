<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedOut Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #FDFBFE;
    gap: 50px;
    padding: 40px 20px;
  }
  .variant-label {
    font-family: 'Fraunces', serif;
    font-size: 12px;
    color: #6B6B63;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .dark-bg {
    background: #1B1B18;
    padding: 40px 60px;
    border-radius: 16px;
  }
</style>
</head>
<body>

<!-- Primary -->
<div class="logo-section">
  <div class="variant-label">Primary</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="700" height="156">
    <text x="8" y="88" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#1B1B18" letter-spacing="-2">Linked</text>
    <image href="character-push.png" x="232" y="34" width="72" height="56" preserveAspectRatio="xMinYMin meet"/>
    <text x="295" y="94" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#A87AD0" letter-spacing="-2"
      transform="rotate(14, 295, 60) skewX(-8)">Out</text>
  </svg>
</div>

<!-- Reversed -->
<div class="logo-section">
  <div class="variant-label">Reversed</div>
  <div class="dark-bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="700" height="156">
      <text x="8" y="88" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#FDFBFE" letter-spacing="-2">Linked</text>
      <image href="character-push.png" x="232" y="34" width="72" height="56" preserveAspectRatio="xMinYMin meet"/>
      <text x="295" y="94" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#A87AD0" letter-spacing="-2"
        transform="rotate(14, 295, 60) skewX(-8)">Out</text>
    </svg>
  </div>
</div>

<!-- Monochrome -->
<div class="logo-section">
  <div class="variant-label">Monochrome</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="700" height="156">
    <text x="8" y="88" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#A87AD0" letter-spacing="-2">Linked</text>
    <image href="character-push.png" x="232" y="34" width="72" height="56" preserveAspectRatio="xMinYMin meet"/>
    <text x="295" y="94" font-family="Fraunces, serif" font-weight="800" font-size="76" fill="#9568BE" letter-spacing="-2"
      transform="rotate(14, 295, 60) skewX(-8)">Out</text>
  </svg>
</div>

</body>
</html>
