[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
pythonpath = src

# Run tests in parallel with auto worker count
# Use -n auto for automatic worker detection
# Use --dist=loadfile to distribute by file
# Exclude @live_llm & @live_langfuse markers
addopts = -n auto --dist=loadfile -v --capture=no --tb=short --color=yes --strict-markers -m "not live_llm and not live_langfuse and not live_services and not integration and not eval"

env =
    LINKEDOUT_ENVIRONMENT=test

markers =
    unit: Mark tests that are unit tests
    integration: Mark tests that require real infrastructure
    live_langfuse: Marks tests that require Langfuse API
    live_llm: Mark tests that make live calls to LLM providers
    live_services: Mark tests that call external services (Apify, etc.) — requires real API keys
    eval: Search quality evaluation tests (run with -m eval)

