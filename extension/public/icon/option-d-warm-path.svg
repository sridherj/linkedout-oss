<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Option D: Warm path — two people connected by a glowing line, "warm intro" -->
  <rect width="128" height="128" rx="28" fill="#9568BE"/>

  <!-- Glowing connection path (curved) -->
  <path d="M36 52 C 52 38, 76 38, 92 52" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M36 52 C 52 42, 76 42, 92 52" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Left person (you) -->
  <circle cx="36" cy="58" r="8" fill="white"/>
  <path d="M24 78a12 12 0 0 1 24 0" fill="white"/>

  <!-- Right person (target) -->
  <circle cx="92" cy="58" r="8" fill="white"/>
  <path d="M80 78a12 12 0 0 1 24 0" fill="white"/>

  <!-- Middle node (the "hop" / mutual connection) -->
  <circle cx="64" cy="40" r="6" fill="white" opacity="0.9"/>
  <!-- Pulse ring around the hop -->
  <circle cx="64" cy="40" r="10" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <circle cx="64" cy="40" r="15" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- Connection lines to the hop -->
  <line x1="42" y1="54" x2="58" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="70" y1="44" x2="86" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
