name: Demo Smoke Test

on:
  pull_request:
    paths:
      - 'backend/src/linkedout/demo/**'
      - 'backend/src/linkedout/setup/**'
      - 'backend/src/linkedout/commands/*demo*'
      - 'backend/src/linkedout/commands/restore_demo.py'
      - 'backend/src/linkedout/commands/reset_demo.py'
      - 'backend/src/linkedout/commands/use_real_db.py'
      - 'backend/src/linkedout/commands/download_demo.py'
      - 'backend/tests/fixtures/generate_test_demo_dump.py'
      - 'backend/tests/smoke/**'
      - '.github/workflows/demo-smoke-test.yml'
  workflow_dispatch:

jobs:
  demo-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    services:
      # Service containers only supported on ubuntu
      postgres:
        image: ${{ matrix.os == 'ubuntu-latest' && 'pgvector/pgvector:pg16' || '' }}
        env:
          POSTGRES_USER: linkedout_test
          POSTGRES_PASSWORD: linkedout_test
          POSTGRES_DB: linkedout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── macOS: install PostgreSQL + pgvector via Homebrew ──────────
      - name: Install PostgreSQL (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install postgresql@16 pgvector
          brew services start postgresql@16
          # Wait for PostgreSQL to start
          for i in $(seq 1 10); do
            pg_isready -h localhost -p 5432 && break
            sleep 1
          done
          # Create test user and database
          createuser -h localhost -p 5432 --superuser linkedout_test 2>/dev/null || true
          psql -h localhost -p 5432 -U $(whoami) -d postgres -c "ALTER USER linkedout_test WITH PASSWORD 'linkedout_test';" || true
          createdb -h localhost -p 5432 -U linkedout_test linkedout_test 2>/dev/null || true
          psql -h localhost -p 5432 -U linkedout_test -d linkedout_test -c "CREATE EXTENSION IF NOT EXISTS vector;" || true

      # ── Install Python dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          pip install uv
          cd backend
          uv pip install --system -r requirements-dev.txt

      # ── Run unit tests (no Postgres needed) ───────────────────────
      - name: Run demo unit tests
        env:
          LINKEDOUT_ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/unit/test_demo_config.py \
                 tests/unit/cli/test_demo_offer_flow.py \
                 tests/unit/cli/test_orchestrator_demo_mode.py \
                 tests/unit/cli/test_nudge_footer.py \
                 tests/unit/cli/test_reset_demo.py \
                 tests/unit/cli/test_use_real_db.py \
                 tests/unit/cli/test_restore_demo.py \
                 tests/unit/cli/test_sample_queries.py \
                 -v --tb=short

      # ── Download real demo dump from GitHub Release ───────────────
      - name: Download demo dump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download demo-v1 --pattern "demo-seed.dump" --dir . || {
            echo "::warning::Demo dump not available from release demo-v1 — skipping search smoke test"
            echo "DEMO_DUMP_AVAILABLE=false" >> "$GITHUB_ENV"
          }
          if [ -f demo-seed.dump ]; then
            echo "DEMO_DUMP_AVAILABLE=true" >> "$GITHUB_ENV"
            ls -lh demo-seed.dump
          fi

      # ── Search smoke test (real dump, real queries) ───────────────
      - name: Search smoke test
        if: env.DEMO_DUMP_AVAILABLE == 'true'
        env:
          DATABASE_URL: postgresql://linkedout_test:linkedout_test@localhost:5432/linkedout_test
          DEMO_DUMP_PATH: demo-seed.dump
        run: |
          cd backend
          python tests/smoke/test_demo_search_smoke.py

      # ── Generate synthetic demo dump (fallback) ───────────────────
      - name: Generate test demo dump
        env:
          DATABASE_URL: postgresql://linkedout_test:linkedout_test@localhost:5432/linkedout_test
        run: |
          cd backend
          python tests/fixtures/generate_test_demo_dump.py "$DATABASE_URL"

      # ── Run integration tests ─────────────────────────────────────
      - name: Run demo integration tests
        env:
          DATABASE_URL: postgresql://linkedout_test:linkedout_test@localhost:5432/linkedout_test
          LINKEDOUT_ENVIRONMENT: integration_test
        run: |
          cd backend
          pytest tests/integration/cli/test_demo_db_integration.py \
                 -m integration -v --tb=short

      # ── CLI smoke test (restore + query + reset) ──────────────────
      - name: CLI smoke test
        env:
          DATABASE_URL: postgresql://linkedout_test:linkedout_test@localhost:5432/linkedout_test
          LINKEDOUT_DATA_DIR: ${{ runner.temp }}/linkedout-data
          LINKEDOUT_ENVIRONMENT: test
        run: |
          mkdir -p "$LINKEDOUT_DATA_DIR/config" "$LINKEDOUT_DATA_DIR/cache"

          # Write initial config
          cat > "$LINKEDOUT_DATA_DIR/config/config.yaml" <<EOF
          database_url: $DATABASE_URL
          demo_mode: false
          EOF

          # Copy synthetic dump to cache dir
          cp backend/tests/fixtures/demo-seed-test.dump "$LINKEDOUT_DATA_DIR/cache/demo-seed.dump" 2>/dev/null || true

          # Install the CLI
          cd backend
          pip install -e . --quiet

          # Restore demo database
          linkedout restore-demo && echo "restore-demo: OK" || echo "restore-demo: SKIPPED (dump may not exist)"

          # Verify demo mode is active
          linkedout status --json 2>/dev/null | python -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              assert data.get('demo_mode') == True, f'Expected demo_mode=True, got {data.get(\"demo_mode\")}'
              print('status check: OK')
          except Exception as e:
              print(f'status check: SKIPPED ({e})')
          " || true

          # Reset demo (restores to original state)
          linkedout reset-demo --yes 2>/dev/null && echo "reset-demo: OK" || echo "reset-demo: SKIPPED"

          # Switch to real DB and drop demo
          linkedout use-real-db --drop-demo 2>/dev/null && echo "use-real-db: OK" || echo "use-real-db: SKIPPED"

          echo "CLI smoke test complete"
